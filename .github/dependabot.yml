---
# Dependabot update schedule (weekly, Monday 06:00 Europe/Berlin; grouped per ecosystem)

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    groups:
      docker:
        patterns: ["*"]
